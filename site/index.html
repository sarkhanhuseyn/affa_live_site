<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFFA Canlı nəticələr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-top">
      <div class="site-top__inner">
        <a class="site-brand" href="#/matches">
          <span class="site-brand__mark">
            <img src="./assets/affa-logo.png" alt="AFFA" />
          </span>
          <span class="site-brand__text">
            <strong>AFFA Canlı nəticələr</strong>
            <small>Azərbaycan Futbol Federasiyaları Assosiasiyası</small>
          </span>
        </a>
        <div class="site-actions">
          <button id="refresh-data" class="button button-secondary" type="button">Yenilə</button>
        </div>
      </div>
    </header>

    <nav class="primary-nav">
      <div class="primary-nav__inner">
        <a href="#/matches">Oyunlar</a>
        <a href="#/competitions">Yarışlar</a>
        <a href="#/tables">Cədvəllər</a>
        <a href="#/clubs">Klublar</a>
        <a href="#/players">Oyunçular</a>
      </div>
    </nav>

    <main class="page-shell">
      <div class="service-bar">
        <div class="service-bar__title">
          <strong>AFFA Canlı nəticələr</strong>
          <span id="data-status">AFFA məlumatları gözlənilir</span>
        </div>
        <div class="service-bar__meta">Rəsmi yarışlar, təqvim, canlı hesablar və cədvəllər</div>
      </div>

      <section id="app" class="app-shell">
        <div class="loading-state">AFFA məlumatları yüklənir…</div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
